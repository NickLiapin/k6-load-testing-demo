name: Load Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  k6:
    name: k6 load tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start target service
        run: |
          node server/index.js &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5050/health && break
            sleep 1
          done

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Smoke test
        run: k6 run scripts/smoke.js

      - name: Load test
        run: k6 run scripts/load.js

      - name: Upload k6 summary
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: summary.json
          retention-days: 14
